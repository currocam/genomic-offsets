[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/fastai/nbdev/blob/master/settings.ini for examples.

### Python library ###
repo = genomic-offsets
lib_name = %(repo)s
version = 0.0.1
min_python = 3.7
license = apache2
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = genomic_offsets
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True

### Docs ###
branch = main
custom_sidebar = False
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = Curro Campuzano Jiménez
author_email = campuzanocurro@gmail.com
copyright = 2024 onwards, %(author)s
description = Implementation of popular genomic offset statistics
keywords = local adaptation genomic offsets
language = English
status = 3
user = currocam

### Optional ###
requirements = numpy numba statsmodels matplotlib tracywidom
dev_requirements = rpy2 
conda_requirements = bioconda::bioconductor-lea
